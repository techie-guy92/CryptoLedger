apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: cryptoledger-monitoring
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://gitlab.com/techie-guy92/cryptoledger.git
    targetRevision: develop
    path: monitoring/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: crypto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true

  revisionHistoryLimit: 5
