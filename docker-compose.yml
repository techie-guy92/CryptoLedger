services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-web
    env_file:
      - .env
    environment:
      ENV_PATH: /app/.env
    depends_on:
      - redis
      - rabbitmq
    ports:
      - "8002:8002"
    restart: always
    networks:
      - main
    volumes:
      - .:/app 
    command: ["sh", "-c", "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.asgi:application --bind 0.0.0.0:8002 --timeout 120 --workers 4 --worker-class uvicorn.workers.UvicornWorker"]
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8020/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # db:
  #   image: postgres:15.4
  #   container_name: ${PROJECT_NAME}-postgres-db
  #   environment:
  #     POSTGRES_DB: ${DB_NAME}
  #     POSTGRES_USER: ${USERNAME}
  #     POSTGRES_PASSWORD: ${PASSWORD}
  #   ports:
  #     - "5433:5432"
  #   restart: always
  #   networks:
  #     - main
  #   volumes:
  #     - crypto-ledger_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7.2
    container_name: ${PROJECT_NAME}-cache
    restart: always
    networks:
      - main
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: ${PROJECT_NAME}-broker
    environment:
      RABBITMQ_DEFAULT_USER: ${USERNAME}
      RABBITMQ_DEFAULT_PASS: ${PASSWORD}
    ports:
      - "127.0.0.1:5674:5672"
      - "127.0.0.1:15674:15672"
    restart: always
    networks:
      - main
    volumes:
      - crypto-ledger_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-celery
    entrypoint: ["celery"]
    command: ["-A", "config", "worker", "--loglevel=info"]
    env_file:
      - .env
    environment:
      ENV_PATH: /app/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - main
    volumes:
      - .:/app  
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # beat:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: ${PROJECT_NAME}-beat
  #   entrypoint: ["celery"]
  #   command: ["-A", "config", "beat", "--loglevel=info"]
  #   env_file:
  #     - .env
  #   environment:
  #     ENV_PATH: /app/.env
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   restart: always
  #   networks:
  #     - main
  #   volumes:
  #     - .:/app  
  #     - crypto-ledger_celerybeat_data:/app/celerybeat-schedule
  #   healthcheck:
  #     test: ["CMD-SHELL", "pgrep -f 'celery beat' || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 30s

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-flower
    entrypoint: ["celery"]
    command: ["-A", "config", "flower", "--port=5555"]  
    ports:
      - "127.0.0.1:5553:5555"  # External (Host):5554 -> Internal (Docker):5555
    env_file:
      - .env
    environment:
      ENV_PATH: /app/.env
    depends_on:
      - rabbitmq
      - redis
      - celery
    restart: always
    networks:
      - main
    volumes:
      - .:/app 
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  main:

volumes:
  crypto-ledger_pgdata:
  crypto-ledger_rabbitmq_data:
  crypto-ledger_celerybeat_data: