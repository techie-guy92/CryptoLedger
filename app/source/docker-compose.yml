services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-web
    env_file:
      - .env
    environment:
      ENV_PATH: /app/.env
    ports:
      - "8000:8000"
    restart: always
    networks:
      - main
    volumes:
      - .:/app 
    command: ["sh", "-c", "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.asgi:application --bind 0.0.0.0:8000 --timeout 120 --workers 4 --worker-class uvicorn.workers.UvicornWorker"]
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  main:
