apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cryptoledger.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}

spec:
  backoffLimit: 3

  template:
    metadata:
      labels:
        app.kubernetes.io/name: cryptoledger
        app.kubernetes.io/instance: crypto

    spec:
      restartPolicy: Never

      containers:
      - name: migrate
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        command:
        - /bin/sh
        - -c
        - |
          until pg_isready -h postgres -p 5432
          do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

          python manage.py migrate

        envFrom:
        - configMapRef:
            name: {{ include "cryptoledger.fullname" . }}-config

        {{- if .Values.secrets.external }}
        - secretRef:
            name: {{ .Values.secrets.name }}
        {{- else }}
        - secretRef:
            name: {{ include "cryptoledger.fullname" . }}-secrets
        {{- end }}
       