apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: postgres

  policyTypes:
    - Ingress

  ingress:
  - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ .Release.Namespace }}
        podSelector:
          matchLabels:
            app.kubernetes.io/name: {{ include "cryptoledger.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}

      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ .Release.Namespace }}
        podSelector:
          matchLabels:
          # {{ include "cryptoledger.monitoringSelectorLabels" . | nindent 12 }}
            app.kubernetes.io/name: {{ include "cryptoledger.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: monitoring

    ports:
      - protocol: TCP
        port: 5432
