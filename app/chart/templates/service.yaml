apiVersion: v1
kind: Service
metadata:
  name: {{ include "cryptoledger.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cryptoledger.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    monitoring: "django"
spec:
  selector:
    {{- include "cryptoledger.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  type: ClusterIP
