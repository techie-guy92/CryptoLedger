apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: crypto
  labels:
    app: postgres-exporter
    app.kubernetes.io/name: {{ include "cryptoledger.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres-exporter

  template:
    metadata:
      labels:
        app: postgres-exporter

    spec:
      containers:
      - name: postgres-exporter
        image: 192.168.122.1:5000/prometheuscommunity/postgres-exporter:v0.17.1
        imagePullPolicy: IfNotPresent

        env:
        - name: DATA_SOURCE_NAME
          valueFrom:
            secretKeyRef:
              name: crypto-secrets
              key: POSTGRES_EXPORTER_DSN

        ports:
        - name: metrics
          containerPort: 9187
          protocol: TCP

        resources:
          requests:
            cpu: 50m
            memory: 64Mi

          limits:
            cpu: 200m
            memory: 128Mi

        livenessProbe:
          httpGet:
            path: /metrics
            port: 9187
            scheme: HTTP

          initialDelaySeconds: 10
          periodSeconds: 30

        readinessProbe:
          httpGet:
            path: /metrics
            port: 9187
            scheme: HTTP

          initialDelaySeconds: 5
          periodSeconds: 10
